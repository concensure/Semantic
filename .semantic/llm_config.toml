# Provider endpoints
# Use placeholders in shared config. Set real endpoints only in local or private config.
[providers]
primary = "<PRIMARY_PROVIDER_BASE_URL>"
secondary = "<SECONDARY_PROVIDER_BASE_URL>"
# local = "<LOCAL_PROVIDER_BASE_URL>"

# Per-provider settings
# model: model id or name
# api_key_env: name of the environment variable that holds the API key locally
[provider_settings.primary]
model = "<PRIMARY_MODEL_NAME>"
api_key_env = "PRIMARY_LLM_API_KEY"

[provider_settings.secondary]
model = "<SECONDARY_MODEL_NAME>"
api_key_env = "SECONDARY_LLM_API_KEY"

[provider_settings.local]
model = "<LOCAL_MODEL_NAME>"
# api_key_env not required for local providers
